name: Farestrack
options:
  bundleIdPrefix: com.shimondeitel.farestrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Farestrack:
    type: application
    platform: iOS
    sources:
      - path: Farestrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.farestrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Farestrack/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FarestrackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FarestrackTests
    dependencies:
      - target: Farestrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.farestrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FarestrackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FarestrackUITests
    dependencies:
      - target: Farestrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.farestrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Farestrack:
    build:
      targets:
        Farestrack: all
        FarestrackTests: [test]
        FarestrackUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Farestrack.storekit
    test:
      config: Debug
      storeKitConfiguration: Farestrack.storekit
      targets:
        - FarestrackTests
        - FarestrackUITests
    archive:
      config: Release
